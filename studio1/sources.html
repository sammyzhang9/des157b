<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sources — Blockbuster Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .sources {
      max-width: 600px;
      padding: 2rem;
      line-height: 2;
      font-size: 1.1rem;
      font-weight: 300;
    }

    .sources h1 {
      font-size: 1.6rem;
      font-weight: 300;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .sources dt {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 1rem;
    }

    .sources dd {
      margin-left: 0;
    }

    .sources a {
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .sources a:hover {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>

  <main class="sources">
    <h1>Sources</h1>

    <dl>
      <dt>Video</dt>
      <dd>Recorded by me</dd>

      <dt>Lyric</dt>
      <dd>"Ditto" by NewJeans</dd>

      <dt>Audio</dt>
      <dd>None / original video audio muted</dd>
    </dl>

    <p style="margin-top: 2rem;">
      <a href="index.html">← back</a>
    </p>
  </main>

</body>
</html>
